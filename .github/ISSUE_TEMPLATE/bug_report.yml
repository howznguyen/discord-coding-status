name: Bug Report
description: Report a reproducible problem with local Discord Rich Presence.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include prompt text, secrets, full paths, or account identifiers.
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA, release tag, or package version.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Minimal commands or steps. Redact local private data.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS/Windows version, Node.js version, Discord Desktop version, tool detected.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste sanitized logs only.
      render: text
